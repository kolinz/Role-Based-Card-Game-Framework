<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 — Role-Based Card Game Framework</title>
  <style>
    /* ── リセット・ベース ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a1a2e;
      --card-bg:     #16213e;
      --surface:     #0f3460;
      --primary:     #6366f1;
      --primary-dark:#4f46e5;
      --secondary:   #f59e0b;
      --success:     #10b981;
      --danger:      #ef4444;
      --text:        #e2e8f0;
      --text-sub:    #94a3b8;
      --border:      rgba(255,255,255,0.1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── ログイン画面 ─────────────────────────────────────────── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
      color: var(--text);
    }

    /* ── 管理画面 ─────────────────────────────────────────────── */
    #adminScreen {
      display: none;
    }

    .admin-header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .admin-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ── タブ ─────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px;
    }

    .tabs button {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      color: var(--text-sub);
      transition: background .18s, color .18s;
    }

    .tabs button:hover     { background: rgba(255,255,255,.07); color: var(--text); }
    .tabs button.active    { background: var(--primary); color: #fff; }

    /* ── タブコンテンツ ───────────────────────────────────────── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .tab-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab-header h2 {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
    }

    /* ── テーブル ─────────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 500px;
    }

    thead th {
      background: var(--surface);
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: .06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody tr {
      border-top: 1px solid var(--border);
      transition: background .15s;
    }

    tbody tr:nth-child(even) { background: rgba(255,255,255,.025); }
    tbody tr:hover           { background: rgba(99,102,241,.12); }

    tbody td {
      padding: 10px 14px;
      vertical-align: middle;
      font-size: 13px;
    }

    .td-actions { white-space: nowrap; display: flex; gap: 6px; }

    /* ── CSV エリア ───────────────────────────────────────────── */
    .csv-area {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .csv-area h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    #csv-preview {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-sub);
      background: rgba(0,0,0,.3);
      border-radius: 8px;
      padding: 10px 12px;
      white-space: pre-wrap;
      display: none;
    }

    /* ── フォーム部品 ────────────────────────────────────────── */
    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 9px 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    input::placeholder, textarea::placeholder  { color: var(--text-sub); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--card-bg); }

    .checkboxes { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .checkboxes label {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500; color: var(--text);
      text-transform: none; letter-spacing: 0;
      cursor: pointer;
    }
    .checkboxes input[type="checkbox"] { cursor: pointer; accent-color: var(--primary); }

    /* ── ボタン ──────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      font-family: inherit; border: none; border-radius: 8px;
      cursor: pointer; transition: opacity .15s, transform .15s;
      white-space: nowrap;
    }
    .btn:hover        { opacity: .85; transform: translateY(-1px); }
    .btn:active       { transform: translateY(0); }
    .btn:disabled     { opacity: .38; pointer-events: none; }

    .btn-primary   { background: var(--primary);  color: #fff; }
    .btn-secondary { background: rgba(255,255,255,.1); color: var(--text); border: 1px solid var(--border); }
    .btn-success   { background: var(--success);  color: #fff; }
    .btn-danger    { background: var(--danger);   color: #fff; }
    .btn-sm        { padding: 5px 10px; font-size: 12px; }

    /* ── モーダル ────────────────────────────────────────────── */
    #cardModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #cardModal.open { display: flex; }

    .modal-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }

    .modal-box h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* ── エラー / 成功 ───────────────────────────────────────── */
    #loginError {
      color: var(--danger);
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
      min-height: 18px;
    }

    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 9999;
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ── レスポンシブ ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .table-wrap { border-radius: 8px; }
      .admin-body { padding: 16px 12px; }
      .tab-header { gap: 6px; }
      .modal-box  { padding: 18px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     ログイン画面
═════════════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <h1>🔐 管理者ログイン</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">ユーザー名</label>

      </div>

        <label for="password">パスワード</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:11px;font-size:14px;margin-top:4px;">
        ログイン
      </button>
      <div id="loginError"></div>
    </form>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     管理画面
═════════════════════════════════════════════════════════════ -->
<div id="adminScreen">

  <div class="admin-header">
    <h1>🎴 RBCGF 管理画面</h1>

          <input type="file" id="csv-categories" accept=".csv"

                  onclick="importCSV('categories')" style="display:none;">確定インポート</button>

        <div id="csv-preview-categories" style="margin-top:10px;font-size:12px;color:var(--text-sub);
             background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;display:none;white-space:pre-wrap;"></div>
      </div>
    </div>

    <!-- ── スキル区分 タブ（v1.2 新規）──────────────────────── -->
    <div id="tab-skill-types" class="tab-content">
      <div class="tab-header">
        <h2>スキル区分 <span id="skill-types-count" style="font-size:12px;color:var(--text-sub);"></span></h2>
        <button class="btn btn-primary btn-sm" onclick="openModal('skill-types')">＋ 新規追加</button>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV('skill-types')">📥 CSV エクスポート</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ID</th><th>名前（日本語）</th><th>名前（英語）</th>
            <th>モデル</th><th>並び順</th><th>操作</th>
          </tr></thead>
          <tbody id="skill-types-table"></tbody>
        </table>
      </div>
      <div class="csv-area">
        <h3>CSV インポート</h3>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <input type="file" id="csv-skill-types" accept=".csv"

        <button class="btn btn-primary btn-sm" onclick="openModal('skills')">＋ 新規追加</button>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV('skills')">📥 CSV エクスポート</button>
      </div>
      <div class="table-wrap">

            <th>対応職種</th><th>画像</th><th>操作</th>

      <div class="csv-area">

        <div id="csv-preview-skills" style="margin-top:10px;font-size:12px;color:var(--text-sub);

    <!-- ── ミッション タブ ──────────────────────────────────── -->

                 onchange="previewCSV('missions',this)" style="flex:1;min-width:160px;">

                  onclick="importCSV('missions')" style="display:none;">確定インポート</button>

<!-- ════════════════════════════════════════════════════════════
     モーダル（追加 / 編集フォーム）
═════════════════════════════════════════════════════════════ -->
<div id="cardModal">
  <div class="modal-box">
    <h2 id="modalTitle">カードを追加</h2>
    <div id="modalForm"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary"   onclick="saveCard()">保存</button>
    </div>
  </div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
// 状態変数
// ════════════════════════════════════════════════════════════════
let adminToken      = localStorage.getItem('admin_token');
let currentTab      = 'categories';
let editingId       = null;
let currentCsvData  = null;
let currentCsvType  = null;
let allData = {
    categories:        [],
    skillTypes:        [],
    skills:            [],
    missions:          [],
    missionCategories: [],
};

// ════════════════════════════════════════════════════════════════
// 初期化
// ════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    // タブ切り替え
    document.querySelectorAll('.tabs button[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // ログインフォーム
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await login();
    });

    // 既存トークンがあれば自動ログイン
    if (adminToken) {
        showAdminScreen();
        loadData();
    }
});

// ════════════════════════════════════════════════════════════════
// ログイン / ログアウト
// ════════════════════════════════════════════════════════════════
async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('loginError');
    errEl.textContent = '';

    try {
        const res  = await fetch('/api/auth/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.ok) {
            adminToken = data.token;
            localStorage.setItem('admin_token', adminToken);
            showAdminScreen();
            await loadData();
        } else {
            errEl.textContent = 'ユーザー名またはパスワードが正しくありません';
        }
    } catch (e) {
        errEl.textContent = 'サーバーに接続できませんでした';
    }
}

function logout() {
    adminToken = null;
    localStorage.removeItem('admin_token');
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display  = 'flex';
}

function showAdminScreen() {
    document.getElementById('loginScreen').style.display  = 'none';
    document.getElementById('adminScreen').style.display  = 'block';
}

function authHeaders() {
    return {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${adminToken}`,
    };
}

// ════════════════════════════════════════════════════════════════
// データ取得
// ════════════════════════════════════════════════════════════════
async function loadData() {
    try {
        const [cats, sts, skills, missions, mc] = await Promise.all([
            fetch('/api/cards/categories').then(r => r.json()),
            fetch('/api/cards/skill-types').then(r => r.json()),
            fetch('/api/cards/skills').then(r => r.json()),
            fetch('/api/cards/missions').then(r => r.json()),
            fetch('/api/cards/mission-categories').then(r => r.json()),
        ]);
        allData = {
            categories:        Array.isArray(cats)    ? cats    : [],
            skillTypes:        Array.isArray(sts)     ? sts     : [],
            skills:            Array.isArray(skills)  ? skills  : [],
            missions:          Array.isArray(missions)? missions: [],
            missionCategories: Array.isArray(mc)      ? mc      : [],
        };
        renderTable(currentTab);
        // 件数バッジ更新
        document.getElementById('categories-count').textContent        = `(${allData.categories.length})`;
        document.getElementById('skill-types-count').textContent       = `(${allData.skillTypes.length})`;
        document.getElementById('skills-count').textContent            = `(${allData.skills.length})`;
        document.getElementById('missions-count').textContent          = `(${allData.missions.length})`;
        document.getElementById('mission-categories-count').textContent= `(${allData.missionCategories.length})`;
    } catch (e) {
        showToast('データ取得に失敗しました: ' + e.message, 'danger');
    }
}

// タブ切り替え
// ════════════════════════════════════════════════════════════════
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tabs button[data-tab]').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === tab)
    );
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    const target = document.getElementById(`tab-${tab}`);
    if (target) target.classList.add('active');
    renderTable(tab);
}

async function saveCard() {
    const type = currentTab;
    let body   = {};

    if (type === 'categories') {
        body = {
            name_ja: gv('f-name_ja'), name_en: gv('f-name_en'),
            targetPoints: Number(gv('f-targetPoints')),
            descriptionHtml_ja: gv('f-descriptionHtml_ja'),
            descriptionHtml_en: gv('f-descriptionHtml_en'),
            imageUrl: gv('f-imageUrl') || null,
        };
    } else if (type === 'skill-types') {
        body = {
            name_ja: gv('f-name_ja'), name_en: gv('f-name_en'),
            model_type: 'katz',
            sortOrder: Number(gv('f-sortOrder')),
            description_ja: gv('f-description_ja'),
            description_en: gv('f-description_en'),
        };
    } else if (type === 'skills') {
        const checked = [...document.querySelectorAll('input[name="matchesCategories"]:checked')]
            .map(el => el.value).join(',');
        body = {
            name_ja: gv('f-name_ja'), name_en: gv('f-name_en'),
            matchesCategories: checked || null,
            descriptionHtml_ja: gv('f-descriptionHtml_ja'),
            descriptionHtml_en: gv('f-descriptionHtml_en'),
            imageUrl: gv('f-imageUrl') || null,
        };
    } else if (type === 'missions') {
        body = {
            name_ja: gv('f-name_ja'), name_en: gv('f-name_en'),
            descriptionHtml_ja: gv('f-descriptionHtml_ja'),
            descriptionHtml_en: gv('f-descriptionHtml_en'),
            categoryId: gv('f-categoryId') || null,
            target_ja: gv('f-target_ja'), target_en: gv('f-target_en'),
            isSpecial: document.getElementById('f-isSpecial')?.checked ? 1 : 0,
        };
    } else if (type === 'mission-categories') {
        body = {
            name_ja: gv('f-name_ja'), name_en: gv('f-name_en'),
            description_ja: gv('f-description_ja'),
            description_en: gv('f-description_en'),
            sortOrder: Number(gv('f-sortOrder')),
        };
    }

    try {
        const url    = editingId ? `/api/admin/${type}/${editingId}` : `/api/admin/${type}`;
        const method = editingId ? 'PUT' : 'POST';
        const res    = await fetch(url, {
            method, headers: authHeaders(), body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.ok) {
            closeModal();
            showToast(editingId ? '✅ 更新しました' : '✅ 追加しました', 'success');
            await loadData();
        } else {
            showToast('❌ ' + (data.error?.message ?? '保存に失敗しました'), 'danger');
        }
    } catch (e) {
        showToast('❌ 通信エラー: ' + e.message, 'danger');
    }
}

// ════════════════════════════════════════════════════════════════
// 画像アップロード（リサイズ + Base64）
// ════════════════════════════════════════════════════════════════
function handleImageUpload(event, targetInputId) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const MAX = 800;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
                const ratio = Math.min(MAX / w, MAX / h);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);

            let quality = 0.75;
            let dataUrl = canvas.toDataURL('image/jpeg', quality);

            // 2MB 超なら品質 0.5 で再エンコード
            if (dataUrl.length > 2 * 1024 * 1024 * 1.33) {
                dataUrl = canvas.toDataURL('image/jpeg', 0.5);
            }

            document.getElementById(targetInputId).value = dataUrl;
            const preview = document.getElementById('img-preview');
            if (preview) { preview.src = dataUrl; preview.style.display = 'block'; }
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// ════════════════════════════════════════════════════════════════
// CSV エクスポート
// ════════════════════════════════════════════════════════════════
function exportCSV(type) {
    const dataMap = {
        categories:          allData.categories,
        'skill-types':       allData.skillTypes,
        skills:              allData.skills,
        missions:            allData.missions,
        'mission-categories':allData.missionCategories,
    };
    const rows = dataMap[type] ?? [];
    if (!rows.length) return showToast('データがありません', 'danger');

    const headers = Object.keys(rows[0]);
    const csv     = [
        headers.join(','),
        ...rows.map(r =>
            headers.map(h => {
                const v = r[h] ?? '';
                return String(v).includes(',') || String(v).includes('"') || String(v).includes('\n')
                    ? `"${String(v).replace(/"/g, '""')}"` : String(v);
            }).join(',')
        ),
    ].join('\r\n');

    // UTF-8 BOM 付きダウンロード
    const bom  = '\uFEFF';
    const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${type}_export_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📥 CSVをエクスポートしました', 'success');
}

// ════════════════════════════════════════════════════════════════
// CSV インポート（プレビュー → 確定）
// ════════════════════════════════════════════════════════════════
function parseCSV(text) {
    const lines   = text.replace(/\r/g, '').split('\n').filter(Boolean);
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    return lines.slice(1).map(line => {
        const vals = [];
        let cur = '', inQ = false;
        for (const ch of line) {
            if (ch === '"') { inQ = !inQ; }
            else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
            else { cur += ch; }
        }
        vals.push(cur.trim());
        const obj = {};
        headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
        return obj;
    });
}

async function previewCSV(type, input) {
    const file = input.files[0];
    if (!file) return;
    currentCsvType = type;

    const text   = await file.text();
    const parsed = parseCSV(text.replace(/^\uFEFF/, '')); // BOM 除去
    currentCsvData = parsed;

    const previewEl  = document.getElementById(`csv-preview-${type}`);
    const confirmBtn = document.getElementById(`csv-confirm-${type}`);

    if (previewEl) {
        previewEl.style.display = 'block';
        previewEl.textContent   =
            `${parsed.length} 件を検出
` +
            `  新規追加（id なし）: ${parsed.filter(r => !r.id).length} 件
` +
            `  更新（id あり）:     ${parsed.filter(r =>  r.id).length} 件

` +
            `先頭データ:
${JSON.stringify(parsed[0], null, 2)}`;
    }
    if (confirmBtn) confirmBtn.style.display = 'inline-flex';
}

async function importCSV(type) {
    if (!currentCsvData || !currentCsvType) return;
    try {
        const res  = await fetch(`/api/admin/import/${currentCsvType}`, {
            method:  'POST',
            headers: authHeaders(),
            body:    JSON.stringify({ csvData: currentCsvData, preview: false }),
        });
        const data = await res.json();
        if (data.ok) {
            showToast(`✅ インポート完了: 追加 ${data.inserted} / 更新 ${data.updated}`, 'success');
            const previewEl  = document.getElementById(`csv-preview-${type}`);
            const confirmBtn = document.getElementById(`csv-confirm-${type}`);
            if (previewEl)  previewEl.style.display  = 'none';
            if (confirmBtn) confirmBtn.style.display = 'none';
            currentCsvData = null; currentCsvType = null;
            await loadData();
        } else {
            showToast('❌ インポート失敗: ' + (data.error?.message ?? ''), 'danger');
        }
    } catch (e) {
        showToast('❌ 通信エラー: ' + e.message, 'danger');
    }
}

// ════════════════════════════════════════════════════════════════
// ユーティリティ
// ════════════════════════════════════════════════════════════════
function esc(str) {
    return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'success') {
    const colors = { success: '#10b981', danger: '#ef4444', info: '#6366f1' };
    const toast  = document.createElement('div');
    toast.className   = 'toast';
    toast.textContent = msg;
    toast.style.borderColor = colors[type] ?? colors.info;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
</script>

</body>
</html>
